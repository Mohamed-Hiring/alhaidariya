<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SKD Accounts · Al Haidariya</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Tahoma,Arial,sans-serif;background:linear-gradient(135deg,#3a2c52,#6A5288,#8b6fb0);min-height:100vh;padding:20px;display:flex;align-items:center;justify-content:center}
.box{width:100%;max-width:440px;background:#fff;border-radius:20px;padding:28px 22px;box-shadow:0 24px 60px rgba(0,0,0,.35)}
.logo{width:64px;height:64px;margin:0 auto 14px;display:block;background:#6A5288;border-radius:16px;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:900;font-size:24px;letter-spacing:1px;box-shadow:0 10px 24px rgba(106,82,136,.35)}
h1{font-size:20px;color:#1a1229;text-align:center;margin-bottom:4px}
.sub{font-size:12px;color:#6b6578;text-align:center;margin-bottom:22px}
.acc{background:#faf7fc;border:1.5px solid #e7dff3;border-radius:12px;padding:14px;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center;gap:10px}
.acc .info{flex:1;min-width:0}
.acc .email{font-weight:800;color:#1a1229;font-size:14px;word-break:break-all}
.acc .pass{font-size:12px;color:#6b6578;margin-top:2px;font-family:monospace}
.status{min-width:70px;text-align:center;padding:6px 10px;border-radius:20px;font-size:11px;font-weight:800}
.s-wait{background:#f4f1f8;color:#6b6578}
.s-ok{background:#d1fae5;color:#065f46}
.s-err{background:#fee2e2;color:#991b1b}
.s-warn{background:#fef3c7;color:#92400e}
.btn{width:100%;padding:15px;border:none;border-radius:12px;background:linear-gradient(135deg,#6A5288,#8b6fb0);color:#fff;font-size:15px;font-weight:800;cursor:pointer;margin-top:8px;box-shadow:0 8px 20px rgba(106,82,136,.35);transition:transform .15s,box-shadow .15s;font-family:Tahoma}
.btn:hover{transform:translateY(-1px);box-shadow:0 12px 26px rgba(106,82,136,.45)}
.btn:disabled{opacity:.6;cursor:not-allowed;transform:none}
.link{display:block;text-align:center;color:#6A5288;font-size:13px;margin-top:14px;text-decoration:none;font-weight:700}
.link:hover{text-decoration:underline}
.note{background:#f3f0fa;border-left:3px solid #6A5288;padding:10px 12px;border-radius:6px;font-size:12px;color:#3a2c52;margin-bottom:16px;line-height:1.6}
.log{margin-top:14px;background:#faf7fc;border:1px solid #e7dff3;border-radius:8px;padding:10px;font-size:11px;color:#6b6578;max-height:150px;overflow-y:auto;font-family:monospace;display:none;white-space:pre-wrap}
</style>
</head>
<body>
<div class="box">
  <div class="logo">AH</div>
  <h1>Create Accounts</h1>
  <p class="sub">Tap once to create all 3 accounts</p>

  <div class="note">
    <b>SKD accounts:</b> <span style="font-family:monospace">SKD@2026</span><br>
    <b>Test employee:</b> <span style="font-family:monospace">Test@2026</span><br>
    Uses public signup — no service key needed.
  </div>

  <div class="acc">
    <div class="info">
      <div class="email">hr@skd.com</div>
      <div class="pass">SKD@2026 · Admin</div>
    </div>
    <div class="status s-wait" id="st0">Ready</div>
  </div>

  <div class="acc">
    <div class="info">
      <div class="email">mohamed@skd.com</div>
      <div class="pass">SKD@2026 · Admin</div>
    </div>
    <div class="status s-wait" id="st1">Ready</div>
  </div>

  <div class="acc" style="border-color:#c4b5e0;background:#f0ebfa">
    <div class="info">
      <div class="email">test@alhaidariya.com</div>
      <div class="pass">Test@2026 · Supervisor (Test)</div>
    </div>
    <div class="status s-wait" id="st2">Ready</div>
  </div>

  <button class="btn" id="go" onclick="run()">Create Accounts</button>
  <a class="link" href="clearance.html">Open the App &rarr;</a>
  <div class="log" id="log"></div>
</div>

<script>
var SUPA_URL  = 'https://phyvnqcmasqzpnxabcwr.supabase.co';
var SUPA_ANON = 'sb_publishable_VIKiuYavPl_81tzk2xveOQ_9gK_kWMU';

var ACCOUNTS = [
  {email:'hr@skd.com',           password:'SKD@2026',  full_name:'SKD — HR',      role:'admin'},
  {email:'mohamed@skd.com',      password:'SKD@2026',  full_name:'SKD — Mohamed', role:'admin'},
  {email:'test@alhaidariya.com', password:'Test@2026', full_name:'Test Employee', role:'supervisor', supervisor_name:'Test Employee'}
];

function setStatus(i, cls, text){
  var el = document.getElementById('st'+i);
  el.className = 'status ' + cls;
  el.textContent = text;
}

function log(msg){
  var el=document.getElementById('log');
  el.style.display='block';
  el.textContent += msg + '\n';
  el.scrollTop=el.scrollHeight;
}

async function createOne(i, acc){
  setStatus(i, 's-wait', 'Working…');
  try{
    // Step 1: Try signUp (public endpoint, no service key needed)
    log('['+acc.email+'] Signing up...');
    var r = await fetch(SUPA_URL+'/auth/v1/signup', {
      method:'POST',
      headers:{
        'apikey': SUPA_ANON,
        'Content-Type':'application/json'
      },
      body:JSON.stringify({
        email: acc.email,
        password: acc.password,
        data: { full_name: acc.full_name, role: acc.role }
      })
    });
    var data = await r.json();
    log('['+acc.email+'] signup response: ' + r.status);

    var userId = null;
    var token = null;
    var already = false;

    // Check if signup succeeded
    if(r.ok && data.user && data.user.id){
      userId = data.user.id;
      token = data.access_token || (data.session && data.session.access_token);
      log('['+acc.email+'] Created, id=' + userId.slice(0,8));
    }

    // If user already exists, try signing in
    if(!userId){
      var errMsg = (data.msg||data.error_description||data.message||JSON.stringify(data)).toLowerCase();
      log('['+acc.email+'] signup failed: ' + errMsg);

      if(errMsg.indexOf('already')!==-1 || errMsg.indexOf('exist')!==-1 || errMsg.indexOf('registered')!==-1){
        log('['+acc.email+'] Already exists, signing in...');
        var lr = await fetch(SUPA_URL+'/auth/v1/token?grant_type=password', {
          method:'POST',
          headers:{
            'apikey': SUPA_ANON,
            'Content-Type':'application/json'
          },
          body:JSON.stringify({ email:acc.email, password:acc.password })
        });
        var ld = await lr.json();
        if(lr.ok && ld.user && ld.user.id){
          userId = ld.user.id;
          token = ld.access_token;
          already = true;
          log('['+acc.email+'] Signed in, id=' + userId.slice(0,8));
        } else {
          log('['+acc.email+'] Sign-in failed: ' + (ld.error_description||ld.msg||JSON.stringify(ld)));
        }
      }
    }

    if(!userId){
      throw new Error(data.msg || data.error_description || 'Unknown error');
    }

    // Step 2: Upsert profile using the user's own token
    if(token){
      log('['+acc.email+'] Creating profile...');
      var pr = await fetch(SUPA_URL+'/rest/v1/user_profiles', {
        method:'POST',
        headers:{
          'Authorization':'Bearer '+token,
          'apikey': SUPA_ANON,
          'Content-Type':'application/json',
          'Prefer':'resolution=merge-duplicates'
        },
        body:JSON.stringify({
          id: userId,
          full_name: acc.full_name,
          role: acc.role,
          supervisor_name: acc.supervisor_name || null
        })
      });
      if(pr.ok || pr.status===201){
        log('['+acc.email+'] Profile saved');
      } else {
        var pe = await pr.text();
        log('['+acc.email+'] Profile warning: ' + pe);
      }
    } else {
      log('['+acc.email+'] No session token — profile skipped (email confirmation may be required)');
      setStatus(i, 's-warn', 'No confirm');
      return true;
    }

    setStatus(i, 's-ok', already ? 'Exists' : 'Created');
    return true;

  } catch(e){
    setStatus(i, 's-err', 'Failed');
    log('['+acc.email+'] ERROR: ' + e.message);
    console.error(acc.email, e);
    return false;
  }
}

async function run(){
  var btn = document.getElementById('go');
  btn.disabled = true;
  btn.textContent = 'Creating…';
  document.getElementById('log').textContent = '';

  for(var i=0;i<ACCOUNTS.length;i++){
    await createOne(i, ACCOUNTS[i]);
  }

  btn.textContent = 'Done — Open the App';
  btn.disabled = false;
  btn.onclick = function(){ window.location.href = 'clearance.html'; };
}
</script>
</body>
</html>
