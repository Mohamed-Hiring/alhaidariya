<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Loading Demo Data...</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', sans-serif; background: linear-gradient(135deg, #16a34a, #059669, #0d9488); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 1rem; }
    .card { background: #fff; border-radius: 20px; padding: 2.5rem 2rem; max-width: 480px; width: 100%; box-shadow: 0 20px 60px rgba(0,0,0,.2); text-align: center; }
    .icon { font-size: 3rem; margin-bottom: 1rem; }
    h1 { font-size: 1.4rem; font-weight: 800; margin-bottom: .5rem; color: #0f172a; }
    p  { color: #64748b; font-size: .9rem; margin-bottom: 1.5rem; }
    .log { background: #f8fafc; border-radius: 10px; padding: 1rem; text-align: left; font-size: .78rem; color: #475569; max-height: 220px; overflow-y: auto; border: 1px solid #e2e8f0; margin-bottom: 1.5rem; }
    .log-line { padding: .18rem 0; display: flex; gap: .5rem; }
    .log-line .dot { color: #22c55e; }
    .btn { display: inline-flex; align-items: center; gap: .5rem; padding: .75rem 2rem; border-radius: 10px; border: none; font-size: .95rem; font-weight: 700; cursor: pointer; background: #22c55e; color: #fff; transition: background .15s; text-decoration: none; }
    .btn:hover { background: #16a34a; }
    .btn-outline { background: transparent; color: #64748b; border: 1.5px solid #e2e8f0; margin-left: .5rem; }
    .btn-outline:hover { background: #f8fafc; }
    .warning { background: #fef3c7; border-radius: 8px; padding: .75rem 1rem; color: #92400e; font-size: .82rem; margin-bottom: 1.5rem; text-align: left; }
  </style>
</head>
<body>
<div class="card">
  <div class="icon">🌱</div>
  <h1>Load Demo Data</h1>
  <p>15 sample customers across Sanad, Al Riffa & Al Akr — assigned to Driver 1 (you) and other drivers.</p>
  <div class="warning">⚠️ This will <strong>reset all existing data</strong> and replace it with demo data.</div>
  <div class="log" id="log"></div>
  <div id="actions">
    <button class="btn" onclick="runSeed()">▶ Load Demo Data</button>
    <a class="btn btn-outline" href="index.html">Cancel</a>
  </div>
  <div id="done" style="display:none">
    <a class="btn" href="index.html" style="margin-left:0">✓ Go to App</a>
    <a class="btn btn-outline" href="driver.html" onclick="sessionStorage.setItem('role','driver');sessionStorage.setItem('driverId','drv001')">🚗 Open as Driver 1</a>
  </div>
</div>
<script>
const log = document.getElementById('log');
function addLog(msg) {
  const line = document.createElement('div');
  line.className = 'log-line';
  line.innerHTML = `<span class="dot">✓</span><span>${msg}</span>`;
  log.appendChild(line);
  log.scrollTop = log.scrollHeight;
}
function runSeed() {
  document.getElementById('actions').innerHTML = '<em style="color:#64748b;font-size:.85rem">Loading...</em>';
  setTimeout(() => { seedAll(); document.getElementById('actions').style.display='none'; document.getElementById('done').style.display=''; }, 100);
}
function seedAll() {
  ['areas','drivers','customers','deliveries'].forEach(k => localStorage.removeItem(k));
  localStorage.setItem('appInitialized','1');
  localStorage.setItem('adminPassword','Admin@2024');
  addLog('Cleared existing data');
  const areas = [{id:'area-sanad',name:'Sanad'},{id:'area-riffa',name:'Al Riffa'},{id:'area-akr',name:'Al Akr'}];

  addLog('Created 3 areas: Sanad, Al Riffa, Al Akr');
  const drivers = [
    {id:'drv001',name:'Driver 1',phone:'0501000001',areaId:'area-sanad'},

    {id:'drv005',name:'Driver 5',phone:'0501000005',areaId:''},

  addLog('Created 5 drivers (Driver 1 = you, area: Sanad)');
  const customers = [
    {id:'c01',name:'Ahmed Al-Mannai',phone:'33421001',address:'Block 721, Road 1708, House 42, Sanad',areaId:'area-sanad',driverId:'drv001',location:{lat:26.2182,lng:50.5718},subscriptionDays:30,remainingDays:22,active:true,notes:'Ground floor, blue door'},
    {id:'c02',name:'Fatima Al-Dosari',phone:'33421002',address:'Block 722, Road 1205, House 7, Sanad',areaId:'area-sanad',driverId:'drv001',location:{lat:26.2208,lng:50.5742},subscriptionDays:14,remainingDays:4,active:true,notes:'Ring bell twice'},
    {id:'c03',name:'Khalid Mubarak',phone:'33421003',address:'Block 721, Road 1712, House 18, Sanad',areaId:'area-sanad',driverId:'drv001',location:{lat:26.2196,lng:50.5700},subscriptionDays:30,remainingDays:30,active:true,notes:''},
    {id:'c04',name:'Mariam Saleh',phone:'33421004',address:'Block 723, Road 1801, House 29, Sanad',areaId:'area-sanad',driverId:'drv001',location:{lat:26.2165,lng:50.5758},subscriptionDays:60,remainingDays:45,active:true,notes:'Apartment 3, second floor'},
    {id:'c05',name:'Yousif Al-Qasim',phone:'33421005',address:'Block 722, Road 1303, House 55, Sanad',areaId:'area-sanad',driverId:'drv001',location:{lat:26.2230,lng:50.5678},subscriptionDays:30,remainingDays:2,active:true,notes:'Confirm by WhatsApp before arrival'},

  const drv1Cs = customers.filter(c => c.driverId==='drv001' && c.active!==false);
  const deliveries = drv1Cs.map(c => ({id:uid(),driverId:'drv001',customerId:c.id,date:today,status:'pending',notes:'',deliveredAt:null,daysDecremented:false}));

}
</script>
</body>
</html>
