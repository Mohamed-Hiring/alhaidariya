<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Al Haidariya — الحيدرية</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Tahoma,Arial,sans-serif;background:linear-gradient(145deg,#3a2c52 0%,#5a4478 30%,#6A5288 60%,#8b6fb0 100%);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
.portal{width:100%;max-width:560px;text-align:center}
.logo-wrap{margin-bottom:32px}
.logo-img{width:220px;max-width:80%;margin:0 auto}
.apps{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-top:36px}
@media(max-width:480px){.apps{grid-template-columns:1fr;gap:12px}}
.app-card{background:rgba(255,255,255,.95);border-radius:20px;padding:30px 20px;text-decoration:none;color:#2c2040;box-shadow:0 16px 48px rgba(0,0,0,.25);transition:all .25s;display:flex;flex-direction:column;align-items:center;gap:12px}
.app-card:hover{transform:translateY(-4px);box-shadow:0 24px 60px rgba(0,0,0,.35);background:#fff}
.app-card:active{transform:translateY(-1px)}
.app-icon{width:64px;height:64px;border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:28px;box-shadow:0 8px 20px rgba(0,0,0,.12)}
.icon-hiring{background:linear-gradient(135deg,#6A5288,#8b6fb0);color:#fff}
.icon-clearance{background:linear-gradient(135deg,#1a7a5a,#2bb87a);color:#fff}
.app-name{font-size:16px;font-weight:800;color:#1a1229}
.app-name-ar{font-size:13px;font-weight:700;color:#6A5288;margin-top:-6px}
.app-desc{font-size:11px;color:#8a8098;line-height:1.5}
.footer{margin-top:40px;color:rgba(255,255,255,.35);font-size:11px}
</style>
</head>
<body>
<div class="portal">
  <div class="logo-wrap">
    <svg class="logo-img" viewBox="0 0 300 120" xmlns="http://www.w3.org/2000/svg">
      <g transform="translate(45,60)">
        <circle cx="0" cy="0" r="22" fill="none" stroke="#fff" stroke-width="4"/>
        <circle cx="0" cy="0" r="10" fill="none" stroke="#fff" stroke-width="3"/>
        <g stroke="#fff" stroke-width="4" stroke-linecap="round">
          <line x1="0" y1="-22" x2="0" y2="-30"/><line x1="19" y1="-11" x2="26" y2="-15"/>
          <line x1="19" y1="11" x2="26" y2="15"/><line x1="0" y1="22" x2="0" y2="30"/>
          <line x1="-19" y1="11" x2="-26" y2="15"/><line x1="-19" y1="-11" x2="-26" y2="-15"/>
        </g>
        <g transform="translate(26,-18)">
          <circle cx="0" cy="0" r="11" fill="none" stroke="#d4af37" stroke-width="3"/>
          <circle cx="0" cy="0" r="5" fill="none" stroke="#d4af37" stroke-width="2"/>
          <g stroke="#d4af37" stroke-width="3" stroke-linecap="round">
            <line x1="0" y1="-11" x2="0" y2="-16"/><line x1="10" y1="-5.5" x2="14" y2="-8"/>
            <line x1="10" y1="5.5" x2="14" y2="8"/><line x1="0" y1="11" x2="0" y2="16"/>
            <line x1="-10" y1="5.5" x2="-14" y2="8"/><line x1="-10" y1="-5.5" x2="-14" y2="-8"/>
          </g>
        </g>
      </g>
      <text x="150" y="42" text-anchor="middle" fill="#fff" font-family="Tahoma,Arial,sans-serif" font-size="26" font-weight="900" letter-spacing="3">ALHAIDARIYA</text>
      <text x="150" y="62" text-anchor="middle" fill="rgba(255,255,255,.6)" font-family="Tahoma,Arial,sans-serif" font-size="11" font-weight="700" letter-spacing="2">HEAVY EQUIPMENT HIRING</text>
      <text x="150" y="90" text-anchor="middle" fill="rgba(255,255,255,.5)" font-family="Tahoma,Arial,sans-serif" font-size="16" font-weight="700" direction="rtl">الحيدرية لتأجير المعدات الثقيلة</text>
    </svg>
  </div>

  <div class="apps">
    <a class="app-card" href="hiring.html">
      <div class="app-icon icon-hiring">
        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 7V5a4 4 0 0 0-8 0v2"/><line x1="12" y1="11" x2="12" y2="15"/></svg>
      </div>
      <div class="app-name">Hiring Cards</div>
      <div class="app-name-ar">بطاقات التأجير</div>
      <div class="app-desc">Equipment hiring, invoices &amp; tracking</div>
    </a>
    <a class="app-card" href="clearance.html">
      <div class="app-icon icon-clearance">
        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="7" cy="17" r="2"/><circle cx="17" cy="17" r="2"/><path d="M5 17H3v-6l2-5h9l4 5h1a2 2 0 0 1 2 2v4h-2m-4 0H9"/><path d="M14 6l4 5h-6V6"/></svg>
      </div>
      <div class="app-name">Vehicle Clearance</div>
      <div class="app-name-ar">فسح المركبات</div>
      <div class="app-desc">Inspection, clearance &amp; status tracking</div>
    </a>
  </div>

  <div class="footer">Al Haidariya Heavy Equipment &copy; 2026</div>
</div>
</body>
</html>
